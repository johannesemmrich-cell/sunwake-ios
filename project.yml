name: Sunwake
options:
  bundleIdPrefix: com.johannesemmrich
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.5"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "XK87E2B3VR"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Sunwake:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sunwake
    resources:
      - path: Sunwake/Resources
    info:
      path: Sunwake/Supporting Files/Info.plist
      properties:
        CFBundleDisplayName: Sunwake
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCalendarsUsageDescription: "Sunwake liest deinen Kalender für dein persönliches Morgen-Briefing."
        NSCalendarsWriteOnlyAccessUsageDescription: "Sunwake kann per KI-Assistent Termine in deinen Kalender eintragen."
        NSRemindersUsageDescription: "Sunwake kann deine Erinnerungen ins Briefing einbeziehen."
        NSLocationWhenInUseUsageDescription: "Sunwake nutzt deinen Standort, um aktuelle Wetterdaten für dein Briefing abzurufen."
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
        NSUserActivityTypes:
          - com.johannesemmrich.sunwake.briefing
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIAppFonts:
          - ClashDisplay-Medium.otf
          - ClashDisplay-Semibold.otf
          - ClashDisplay-Bold.otf
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
            UIPrerenderedIcon: false
          CFBundleAlternateIcons:
            AppIcon-Strahlen:
              CFBundleIconFiles:
                - AppIcon-Strahlen
              UIPrerenderedIcon: false
            AppIcon-Horizont:
              CFBundleIconFiles:
                - AppIcon-Horizont
              UIPrerenderedIcon: false
            AppIcon-Briefing:
              CFBundleIconFiles:
                - AppIcon-Briefing
              UIPrerenderedIcon: false
            AppIcon-Halo:
              CFBundleIconFiles:
                - AppIcon-Halo
              UIPrerenderedIcon: false
            AppIcon-Berge:
              CFBundleIconFiles:
                - AppIcon-Berge
              UIPrerenderedIcon: false
            AppIcon-Classic:
              CFBundleIconFiles:
                - AppIcon-Classic
              UIPrerenderedIcon: false
            AppIcon-Dawn:
              CFBundleIconFiles:
                - AppIcon-Dawn
              UIPrerenderedIcon: false
            AppIcon-Midnight:
              CFBundleIconFiles:
                - AppIcon-Midnight
              UIPrerenderedIcon: false
            AppIcon-Forest:
              CFBundleIconFiles:
                - AppIcon-Forest
              UIPrerenderedIcon: false
            AppIcon-Ocean:
              CFBundleIconFiles:
                - AppIcon-Ocean
              UIPrerenderedIcon: false
            AppIcon-Slate:
              CFBundleIconFiles:
                - AppIcon-Slate
              UIPrerenderedIcon: false
            AppIcon-Minimal:
              CFBundleIconFiles:
                - AppIcon-Minimal
              UIPrerenderedIcon: false
    entitlements:
      path: Sunwake/Supporting Files/Sunwake.entitlements
    dependencies:
      - target: SunwakeDynamicIsland
        embed: true
      - target: SunwakeWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.sunwake
        INFOPLIST_FILE: "Sunwake/Supporting Files/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "Sunwake/Supporting Files/Sunwake.entitlements"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES

  # Dynamic Island / Live Activity extension
  SunwakeDynamicIsland:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SunwakeDynamicIsland
      # Share the ActivityAttributes model with the main app
      - path: Sunwake/Core/Services/LiveActivityService.swift
    info:
      path: SunwakeDynamicIsland/Info.plist
      properties:
        CFBundleDisplayName: SunwakeDynamicIsland
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.sunwake.dynamicisland
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

  # Home Screen Widget extension
  SunwakeWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SunwakeWidgetExtension
    info:
      path: SunwakeWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: SunwakeWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.sunwake.widget
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

  SunwakeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SunwakeTests
    dependencies:
      - target: Sunwake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.sunwake.tests
        GENERATE_INFOPLIST_FILE: YES

  SunwakeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SunwakeUITests
    dependencies:
      - target: Sunwake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.sunwake.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Sunwake:
    build:
      targets:
        Sunwake: all
        SunwakeDynamicIsland: all
        SunwakeWidgetExtension: all
        SunwakeTests: [test]
        SunwakeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: SunwakeTests
          parallelizable: true
          randomExecutionOrder: true
        - name: SunwakeUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
