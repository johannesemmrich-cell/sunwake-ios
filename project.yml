name: Lumio
options:
  bundleIdPrefix: com.johannesemmrich
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.5"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Lumio:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Lumio
    resources:
      - path: Lumio/Resources
    info:
      path: Lumio/Supporting Files/Info.plist
      properties:
        CFBundleDisplayName: Lumio
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCalendarsUsageDescription: "Lumio liest deinen Kalender für dein persönliches Morgen-Briefing."
        NSCalendarsWriteOnlyAccessUsageDescription: "Lumio kann per KI-Assistent Termine in deinen Kalender eintragen."
        NSRemindersUsageDescription: "Lumio kann deine Erinnerungen ins Briefing einbeziehen."
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
        NSUserActivityTypes:
          - com.johannesemmrich.lumio.briefing
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
            UIPrerenderedIcon: false
          CFBundleAlternateIcons:
            AppIcon-Dawn:
              CFBundleIconFiles:
                - AppIcon-Dawn
              UIPrerenderedIcon: false
            AppIcon-Midnight:
              CFBundleIconFiles:
                - AppIcon-Midnight
              UIPrerenderedIcon: false
            AppIcon-Forest:
              CFBundleIconFiles:
                - AppIcon-Forest
              UIPrerenderedIcon: false
            AppIcon-Ocean:
              CFBundleIconFiles:
                - AppIcon-Ocean
              UIPrerenderedIcon: false
    entitlements:
      path: Lumio/Supporting Files/Lumio.entitlements
    dependencies:
      - target: LumioDynamicIsland
        embed: true
      - target: LumioWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.lumio
        INFOPLIST_FILE: "Lumio/Supporting Files/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "Lumio/Supporting Files/Lumio.entitlements"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES

  # Dynamic Island / Live Activity extension
  LumioDynamicIsland:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LumioDynamicIsland
      # Share the ActivityAttributes model with the main app
      - path: Lumio/Core/Services/LiveActivityService.swift
    info:
      path: LumioDynamicIsland/Info.plist
      properties:
        CFBundleDisplayName: LumioDynamicIsland
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.lumio.dynamicisland
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

  # Home Screen Widget extension
  LumioWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LumioWidgetExtension
    info:
      path: LumioWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: LumioWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.lumio.widget
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

  LumioTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LumioTests
    dependencies:
      - target: Lumio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.lumio.tests

  LumioUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LumioUITests
    dependencies:
      - target: Lumio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannesemmrich.lumio.uitests

schemes:
  Lumio:
    build:
      targets:
        Lumio: all
        LumioDynamicIsland: all
        LumioWidgetExtension: all
        LumioTests: [test]
        LumioUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: LumioTests
          parallelizable: true
          randomExecutionOrder: true
        - name: LumioUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
